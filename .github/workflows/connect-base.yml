name: Build Connect Base Image

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "connect-base/**"
  push:
    branches: [main]
    paths:
      - "connect-base/**"

jobs:
  pr-build:
    if: github.event_name == 'pull_request'
    uses: ZeroGachis/.github/.github/workflows/build-image.yml@v6
    permissions:
      contents: read
      security-events: write
      actions: read
      id-token: write
      packages: write
      pull-requests: write
      checks: write
    with:
      image_name: debezium-alpine-connect-base
      build-args: |
        ARG OTEL_ENABLED=no
        ARG APICURIO_ENABLED=no
        ARG JOLOKIA_ENABLED=no
      dockerfile_context: connect-base/
      vault_enabled: false
      tailscale_enabled: false
      regitry_url: ghcr.io
      security_scan_output_format: sarif
      trivy_severity: "CRITICAL,HIGH,MEDIUM,LOW"

  # pr-build-full:
  #   if: github.event_name == 'pull_request'
  #   uses: ZeroGachis/.github/.github/workflows/build-image.yml@v5
  #   permissions:
  #     contents: read
  #     security-events: write
  #     actions: read
  #     id-token: write
  #     packages: write
  #     pull-requests: write
  #     checks: write
  #   with:
  #     image_name: debezium-alpine-connect-base-full
  #     build-args: |
  #       ARG OTEL_ENABLED=yes
  #       ARG APICURIO_ENABLED=yes
  #       ARG JOLOKIA_ENABLED=yes
  #     dockerfile_context: connect-base/
  #     vault_enabled: false
  #     tailscale_enabled: false
  #     regitry_url: ghcr.io
  #     security_scan_output_format: sarif
  #     trivy_severity: "CRITICAL,HIGH,MEDIUM,LOW"

  extract-version:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      debezium_version: ${{ steps.get-version.outputs.debezium_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Debezium version from Dockerfile
        id: get-version
        run: |
          VERSION=$(grep '^FROM' connect-base/Dockerfile | head -1 | sed 's/.*://')
          echo "debezium_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Debezium version: ${VERSION}"

  release:
    needs: extract-version
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ZeroGachis/.github/.github/workflows/build-push-image-to-dockerhub.yml@v6
    permissions:
      contents: read
      security-events: write
      actions: read
      id-token: write
      packages: write
      pull-requests: write
      checks: write
    with:
      dockerfile_context: connect-base/
      dockerhub_repository_name: debezium-alpine-connect-base
      tag: |
        ${{ needs.extract-version.outputs.debezium_version }}
        latest
    secrets: inherit

  trivy-scan:
    needs: [extract-version, release]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Manual Trivy Setup
        uses: aquasecurity/setup-trivy@v0.2.5
        with:
          version: v0.69.2
          cache: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.1
        with:
          version: v0.69.2
          skip-setup-trivy: true
          image-ref: ${{ vars.DOCKERHUB_USERNAME }}/debezium-alpine-connect-base:${{ needs.extract-version.outputs.debezium_version }}
          format: "sarif"
          output: "trivy-results-debezium-alpine-connect-base.sarif"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          trivyignores: ".trivyignore"
        env:
          TRIVY_DISABLE_VEX_NOTICE: true

      - name: Edit Trivy Sarif result
        run: |
          jq ".runs[0].tool.driver.name = \"Trivy-image-debezium-alpine-connect-base\"" ./trivy-results-debezium-alpine-connect-base.sarif > ./trivy-results-debezium-alpine-connect-base-edited.sarif

      - name: Upload Trivy Sarif result
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results-debezium-alpine-connect-base-edited.sarif"
          category: Trivy-docker-debezium-alpine-connect-base

      - name: Trivy vulnerability block Critical
        uses: aquasecurity/trivy-action@0.34.1
        with:
          version: v0.69.2
          skip-setup-trivy: true
          image-ref: ${{ vars.DOCKERHUB_USERNAME }}/debezium-alpine-connect-base:${{ needs.extract-version.outputs.debezium_version }}
          format: "json"
          exit-code: 1
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"
          trivyignores: ".trivyignore"
        env:
          TRIVY_DISABLE_VEX_NOTICE: true
