name: Build Final Images

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "postgresql-slim/**"
      - "snowflake-slim/**"
      - "mariadb-slim/**"
      - "jdbc-slim/**"
  push:
    branches: [main]
    paths:
      - "postgresql-slim/**"
      - "snowflake-slim/**"
      - "mariadb-slim/**"
      - "jdbc-slim/**"

jobs:
  pr-build:
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        plugin: [postgresql-slim, snowflake-slim, mariadb-slim, jdbc-slim]
    uses: ZeroGachis/.github/.github/workflows/build-image.yml@v6
    permissions:
      contents: read
      security-events: write
      actions: read
      id-token: write
      packages: write
      pull-requests: write
      checks: write
    with:
      image_name: debezium-${{ matrix.plugin }}
      dockerfile_context: ${{ matrix.plugin }}/
      vault_enabled: false
      tailscale_enabled: false
      regitry_url: ghcr.io
      security_scan_output_format: sarif
      trivy_severity: "CRITICAL,HIGH,MEDIUM,LOW"

  extract-versions:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from each plugin Dockerfile
        id: get-versions
        run: |
          VERSIONS='{}'
          for plugin in postgresql-slim snowflake-slim mariadb-slim jdbc-slim; do
            VERSION=$(grep '^FROM' "$plugin/Dockerfile" | head -1 | sed 's/.*://')
            VERSIONS=$(echo "$VERSIONS" | jq --arg k "$plugin" --arg v "$VERSION" '. + {($k): $v}')
            echo "Detected version for $plugin: $VERSION"
          done
          echo "versions=$(echo $VERSIONS | jq -c .)" >> "$GITHUB_OUTPUT"

  release:
    needs: extract-versions
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        plugin: [postgresql-slim, snowflake-slim, mariadb-slim, jdbc-slim]
    uses: ZeroGachis/.github/.github/workflows/build-push-image-to-dockerhub.yml@v6
    permissions:
      contents: read
      security-events: write
      actions: read
      id-token: write
      packages: write
      pull-requests: write
      checks: write
    with:
      dockerfile_context: ${{ matrix.plugin }}/
      dockerhub_repository_name: debezium-${{ matrix.plugin }}
      tag: |
        ${{ fromJSON(needs.extract-versions.outputs.versions)[matrix.plugin] }}
        latest
    secrets: inherit

  trivy-scan:
    needs: [extract-versions, release]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: [postgresql-slim, snowflake-slim, mariadb-slim, jdbc-slim]
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Manual Trivy Setup
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.69.2
          cache: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.1
        with:
          version: v0.69.2
          skip-setup-trivy: true
          image-ref: ${{ vars.DOCKERHUB_USERNAME }}/debezium-${{ matrix.plugin }}:${{ fromJSON(needs.extract-versions.outputs.versions)[matrix.plugin] }}
          format: "sarif"
          output: "trivy-results-debezium-${{ matrix.plugin }}.sarif"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          trivyignores: ".trivyignore"
        env:
          TRIVY_DISABLE_VEX_NOTICE: true

      - name: Edit Trivy Sarif result
        run: |
          jq ".runs[0].tool.driver.name = \"Trivy-image-debezium-${{ matrix.plugin }}\"" ./trivy-results-debezium-${{ matrix.plugin }}.sarif > ./trivy-results-debezium-${{ matrix.plugin }}-edited.sarif

      - name: Upload Trivy Sarif result
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results-debezium-${{ matrix.plugin }}-edited.sarif"
          category: Trivy-docker-debezium-${{ matrix.plugin }}

      - name: Trivy vulnerability block Critical
        uses: aquasecurity/trivy-action@0.34.1
        with:
          version: v0.69.2
          skip-setup-trivy: true
          image-ref: ${{ vars.DOCKERHUB_USERNAME }}/debezium-${{ matrix.plugin }}:${{ fromJSON(needs.extract-versions.outputs.versions)[matrix.plugin] }}
          format: "json"
          exit-code: 1
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"
          trivyignores: ".trivyignore"
        env:
          TRIVY_DISABLE_VEX_NOTICE: true
